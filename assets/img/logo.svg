<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cookbook Memory logo">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- app-icon tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#cbg)"/>

  <!-- open cookbook: two pages -->
  <path d="M31 22 C 23 18 14 19 10 21 L 10 45 C 14 43 23 44 31 47 Z" fill="#ffffff"/>
  <path d="M33 22 C 41 18 50 19 54 21 L 54 45 C 50 43 41 44 33 47 Z" fill="#e6ecff"/>
  <!-- spine -->
  <path d="M32 21 L 32 47" stroke="#4f46e5" stroke-width="2" opacity="0.35" stroke-linecap="round"/>

  <!-- recipe lines -->
  <g stroke="#c3cffb" stroke-width="1.5" stroke-linecap="round">
    <line x1="14" y1="27" x2="27" y2="28.4"/>
    <line x1="14" y1="31" x2="27" y2="32.4"/>
    <line x1="14" y1="35" x2="25" y2="36.2"/>
    <line x1="37" y1="28.4" x2="50" y2="27"/>
    <line x1="37" y1="32.4" x2="50" y2="31"/>
    <line x1="39" y1="36.2" x2="50" y2="35"/>
  </g>

  <!-- bookmark ribbon -->
  <path d="M29.5 14 L 38.5 14 L 38.5 31 L 34 27 L 29.5 31 Z" fill="#f472b6"/>

  <!-- memory spark -->
  <path d="M49 10 L 50.5 12.8 L 53.3 14 L 50.5 15.2 L 49 18 L 47.5 15.2 L 44.7 14 L 47.5 12.8 Z" fill="#fde68a"/>
  <circle cx="44.5" cy="20.5" r="1.2" fill="#ffffff" opacity="0.85"/>
</svg>
