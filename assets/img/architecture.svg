<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="AI Agent Memory Harness architecture diagram">
  <defs>
    <linearGradient id="g-agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g-bus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b2433"/><stop offset="1" stop-color="#243044"/>
    </linearGradient>
    <marker id="ah-m" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6d7e95"/></marker>
    <marker id="ah-b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b9dff"/></marker>
    <marker id="ah-t" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2dd4bf"/></marker>
    <marker id="ah-a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fbbf24"/></marker>
    <marker id="ah-p" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f472b6"/></marker>
    <marker id="ah-t2" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#2dd4bf"/></marker>
    <marker id="ah-p2" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#f472b6"/></marker>
    <marker id="ah-m2" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#6d7e95"/></marker>
  </defs>

  <rect x="0" y="0" width="1100" height="720" rx="16" fill="#0b0e14"/>

  <!-- ===== Agent ===== -->
  <g>
    <rect x="400" y="36" width="300" height="78" rx="14" fill="#121826" stroke="url(#g-agent)" stroke-width="1.6"/>
    <text x="550" y="68" text-anchor="middle" fill="#e7edf5" font-size="18" font-weight="700">Coding Agent</text>
    <text x="550" y="92" text-anchor="middle" fill="#9fb0c5" font-size="12.5">OpenCode harness · write · query · session lifecycle</text>
  </g>

  <!-- ===== Harness container ===== -->
  <rect x="44" y="158" width="1012" height="286" rx="16" fill="#0e1320" stroke="#243044" stroke-width="1.2"/>
  <text x="66" y="184" fill="#6d7e95" font-size="12" font-weight="700" letter-spacing="2">AI MEMORY HARNESS</text>

  <!-- Persistence (1) -->
  <g>
    <rect x="70" y="200" width="300" height="222" rx="12" fill="#121826" stroke="#243044"/>
    <rect x="70" y="200" width="300" height="4" rx="2" fill="#8b9dff"/>
    <circle cx="96" cy="232" r="13" fill="#1a2233" stroke="#8b9dff"/>
    <text x="96" y="237" text-anchor="middle" fill="#8b9dff" font-size="13" font-weight="700">1</text>
    <text x="120" y="237" fill="#e7edf5" font-size="16" font-weight="700">Persistence Layer</text>
    <text x="90" y="268" fill="#9fb0c5" font-size="12.5">Write path — decides what, when</text>
    <text x="90" y="287" fill="#9fb0c5" font-size="12.5">&amp; where to save. Tags each item:</text>
    <text x="90" y="318" fill="#cbd5e8" font-size="12.5">• timestamp · relevancy score</text>
    <text x="90" y="340" fill="#cbd5e8" font-size="12.5">• session tag · provenance</text>
    <text x="90" y="362" fill="#cbd5e8" font-size="12.5">• versioning + dedup hints</text>
    <text x="90" y="397" fill="#6d7e95" font-size="11.5" font-style="italic">save → MD · SQLite · Graph</text>
  </g>

  <!-- Retrieval Orchestrator (3) -->
  <g>
    <rect x="400" y="200" width="300" height="98" rx="12" fill="#121826" stroke="#243044"/>
    <rect x="400" y="200" width="300" height="4" rx="2" fill="#2dd4bf"/>
    <circle cx="426" cy="232" r="13" fill="#16241f" stroke="#2dd4bf"/>
    <text x="426" y="237" text-anchor="middle" fill="#2dd4bf" font-size="13" font-weight="700">3</text>
    <text x="450" y="237" fill="#e7edf5" font-size="16" font-weight="700">Retrieval Orchestrator</text>
    <text x="420" y="266" fill="#9fb0c5" font-size="12.5">Unified query API → rank by</text>
    <text x="420" y="285" fill="#9fb0c5" font-size="12.5">recency × relevancy → dedup → return</text>
  </g>

  <!-- Router (2) -->
  <g>
    <rect x="400" y="322" width="300" height="100" rx="12" fill="#121826" stroke="#243044"/>
    <rect x="400" y="322" width="300" height="4" rx="2" fill="#fbbf24"/>
    <circle cx="426" cy="354" r="13" fill="#241f12" stroke="#fbbf24"/>
    <text x="426" y="359" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">2</text>
    <text x="450" y="359" fill="#e7edf5" font-size="16" font-weight="700">Intelligent Router</text>
    <text x="420" y="388" fill="#9fb0c5" font-size="12.5">Classifies the query and routes to</text>
    <text x="420" y="407" fill="#9fb0c5" font-size="12.5">the single best backend (rules/learned)</text>
  </g>

  <!-- Zooming (4) -->
  <g>
    <rect x="730" y="200" width="300" height="222" rx="12" fill="#121826" stroke="#243044"/>
    <rect x="730" y="200" width="300" height="4" rx="2" fill="#f472b6"/>
    <circle cx="756" cy="232" r="13" fill="#241622" stroke="#f472b6"/>
    <text x="756" y="237" text-anchor="middle" fill="#f472b6" font-size="13" font-weight="700">4</text>
    <text x="780" y="232" fill="#e7edf5" font-size="16" font-weight="700">Zooming Component</text>
    <text x="780" y="250" fill="#f472b6" font-size="11" font-weight="600">ASYNC · OFFLINE</text>
    <text x="752" y="288" fill="#cbd5e8" font-size="12.5">• Deduplicate across backends</text>
    <text x="752" y="312" fill="#cbd5e8" font-size="12.5">• Resolve contradictions</text>
    <text x="752" y="336" fill="#cbd5e8" font-size="12.5">• Session governance:</text>
    <text x="766" y="356" fill="#9fb0c5" font-size="12">must-know · must-do · blacklist</text>
    <text x="752" y="384" fill="#cbd5e8" font-size="12.5">• Selective retention &amp; pruning</text>
  </g>

  <!-- ===== Storage bus ===== -->
  <rect x="70" y="468" width="960" height="34" rx="10" fill="url(#g-bus)" stroke="#243044"/>
  <text x="550" y="490" text-anchor="middle" fill="#9fb0c5" font-size="12.5" font-weight="600">Unified Storage Interface · per-backend index</text>

  <!-- ===== Storage backends ===== -->
  <g>
    <rect x="70" y="540" width="300" height="150" rx="12" fill="#121826" stroke="#243044"/>
    <text x="220" y="578" text-anchor="middle" fill="#e7edf5" font-size="15" font-weight="700">Markdown + YAML</text>
    <text x="220" y="604" text-anchor="middle" fill="#9fb0c5" font-size="12.5">Human-readable notes</text>
    <text x="220" y="640" text-anchor="middle" fill="#8b9dff" font-size="12.5" font-weight="600">Index: inverted keyword map</text>
    <text x="220" y="662" text-anchor="middle" fill="#6d7e95" font-size="11.5">keyword → file path</text>
  </g>
  <g>
    <rect x="400" y="540" width="300" height="150" rx="12" fill="#121826" stroke="#243044"/>
    <text x="550" y="578" text-anchor="middle" fill="#e7edf5" font-size="15" font-weight="700">SQLite + Vectors</text>
    <text x="550" y="604" text-anchor="middle" fill="#9fb0c5" font-size="12.5">Semantic similarity search</text>
    <text x="550" y="640" text-anchor="middle" fill="#2dd4bf" font-size="12.5" font-weight="600">Index: HNSW / FAISS ANN</text>
    <text x="550" y="662" text-anchor="middle" fill="#6d7e95" font-size="11.5">embed → nearest neighbours</text>
  </g>
  <g>
    <rect x="730" y="540" width="300" height="150" rx="12" fill="#121826" stroke="#243044"/>
    <text x="880" y="578" text-anchor="middle" fill="#e7edf5" font-size="15" font-weight="700">Graph Store</text>
    <text x="880" y="604" text-anchor="middle" fill="#9fb0c5" font-size="12.5">Memory relationships &amp; conflicts</text>
    <text x="880" y="640" text-anchor="middle" fill="#f472b6" font-size="12.5" font-weight="600">Index: typed traversal</text>
    <text x="880" y="662" text-anchor="middle" fill="#6d7e95" font-size="11.5">node / edge type lookup</text>
  </g>

  <!-- ===== Arrows ===== -->
  <!-- agent -> persistence (write) -->
  <path d="M470,114 C420,150 300,160 235,200" fill="none" stroke="#8b9dff" stroke-width="1.8" marker-end="url(#ah-b)"/>
  <rect x="316" y="150" width="56" height="20" rx="5" fill="#0b0e14"/>
  <text x="344" y="164" text-anchor="middle" fill="#8b9dff" font-size="11.5" font-weight="600">write</text>

  <!-- agent <-> orchestrator (query / results) -->
  <line x1="536" y1="116" x2="536" y2="198" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#ah-t)"/>
  <line x1="566" y1="198" x2="566" y2="116" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#ah-t2)"/>
  <rect x="486" y="146" width="44" height="20" rx="5" fill="#0b0e14"/>
  <text x="508" y="160" text-anchor="middle" fill="#2dd4bf" font-size="11.5" font-weight="600">query</text>
  <rect x="572" y="146" width="50" height="20" rx="5" fill="#0b0e14"/>
  <text x="597" y="160" text-anchor="middle" fill="#2dd4bf" font-size="11.5" font-weight="600">results</text>

  <!-- orchestrator <-> router (delegate) -->
  <line x1="550" y1="298" x2="550" y2="320" stroke="#9fb0c5" stroke-width="1.6" marker-end="url(#ah-m)"/>

  <!-- persistence -> bus (write down) -->
  <line x1="220" y1="422" x2="220" y2="466" stroke="#8b9dff" stroke-width="1.8" marker-end="url(#ah-b)"/>

  <!-- router -> bus (route, dashed) -->
  <line x1="550" y1="422" x2="550" y2="466" stroke="#fbbf24" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#ah-a)"/>
  <rect x="556" y="434" width="92" height="20" rx="5" fill="#0b0e14"/>
  <text x="602" y="448" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">route to 1 backend</text>

  <!-- zooming <-> bus (async, dotted bidirectional) -->
  <line x1="880" y1="422" x2="880" y2="466" stroke="#f472b6" stroke-width="1.8" stroke-dasharray="2 4" marker-end="url(#ah-p)" marker-start="url(#ah-p2)"/>
  <rect x="886" y="434" width="104" height="20" rx="5" fill="#0b0e14"/>
  <text x="938" y="448" fill="#f472b6" font-size="11" font-weight="600" text-anchor="middle">async reconcile</text>

  <!-- bus -> backends (bidirectional read/write) -->
  <line x1="220" y1="502" x2="220" y2="538" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#ah-m)" marker-start="url(#ah-m2)"/>
  <line x1="550" y1="502" x2="550" y2="538" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#ah-m)" marker-start="url(#ah-m2)"/>
  <line x1="880" y1="502" x2="880" y2="538" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#ah-m)" marker-start="url(#ah-m2)"/>
</svg>
