<svg viewBox="0 0 1200 410" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Cookbook Memory dependency map and critical path">
  <defs>
    <linearGradient id="dgp" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <marker id="dah-c" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#38e0c8"/></marker>
    <marker id="dah-m" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6d7e95"/></marker>
  </defs>

  <rect x="0" y="0" width="1200" height="410" rx="16" fill="#0b0e14"/>

  <!-- timeline labels -->
  <g fill="#6d7e95" font-size="11" font-weight="600" text-anchor="middle">
    <text x="104" y="22">D1–D3</text>
    <text x="335" y="22">D3–D5</text>
    <text x="545" y="22">D5–D6</text>
    <text x="762" y="22">D6–D8</text>
    <text x="977" y="22">D8</text>
    <text x="1125" y="22">D10</text>
  </g>

  <!-- ===== edges (drawn first, under nodes) ===== -->
  <!-- normal (mute) -->
  <path d="M184,196 C 215,110 222,80 250,76" fill="none" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#dah-m)"/>
  <path d="M420,292 C 520,348 600,348 672,328" fill="none" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#dah-m)"/>
  <path d="M852,327 C 884,327 890,250 905,244" fill="none" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#dah-m)"/>
  <path d="M420,72 L884,72 L902,198" fill="none" stroke="#6d7e95" stroke-width="1.6" marker-end="url(#dah-m)"/>
  <!-- critical path (bright, thick) -->
  <path d="M184,216 C 216,255 226,277 250,277" fill="none" stroke="#38e0c8" stroke-width="2.6" marker-end="url(#dah-c)"/>
  <path d="M420,277 L470,277" fill="none" stroke="#38e0c8" stroke-width="2.6" marker-end="url(#dah-c)"/>
  <path d="M620,272 C 650,272 650,147 672,147" fill="none" stroke="#38e0c8" stroke-width="2.6" marker-end="url(#dah-c)"/>
  <path d="M852,150 C 882,150 888,224 905,226" fill="none" stroke="#38e0c8" stroke-width="2.6" marker-end="url(#dah-c)"/>
  <path d="M1050,229 L1065,229" fill="none" stroke="#38e0c8" stroke-width="2.6" marker-end="url(#dah-c)"/>

  <!-- ===== nodes ===== -->
  <!-- A: freeze gate -->
  <g>
    <rect x="24" y="175" width="160" height="66" rx="12" fill="#121826" stroke="url(#dgp)" stroke-width="1.6"/>
    <text x="104" y="203" text-anchor="middle" fill="#e7edf5" font-size="12.5" font-weight="700">Interface + schema</text>
    <text x="104" y="221" text-anchor="middle" fill="#22d3ee" font-size="11.5" font-weight="700">FREEZE · D3</text>
    <text x="104" y="236" text-anchor="middle" fill="#9fb0c5" font-size="10.5">Keith + Brent</text>
  </g>
  <!-- G: datasets + harness (Ken) -->
  <g>
    <rect x="250" y="48" width="170" height="54" rx="11" fill="#121826" stroke="#243044"/>
    <rect x="250" y="48" width="4" height="54" rx="2" fill="#2dd4bf"/>
    <text x="338" y="72" text-anchor="middle" fill="#e7edf5" font-size="12.5" font-weight="700">Datasets + run harness</text>
    <text x="338" y="90" text-anchor="middle" fill="#2dd4bf" font-size="11">Ken</text>
  </g>
  <!-- C: backends (Brent) -->
  <g>
    <rect x="250" y="250" width="170" height="54" rx="11" fill="#121826" stroke="#243044"/>
    <rect x="250" y="250" width="4" height="54" rx="2" fill="#fbbf24"/>
    <text x="338" y="274" text-anchor="middle" fill="#e7edf5" font-size="12" font-weight="700">Storage backends + indexes</text>
    <text x="338" y="292" text-anchor="middle" fill="#fbbf24" font-size="11">Brent</text>
  </g>
  <!-- D: router (Brent) -->
  <g>
    <rect x="470" y="250" width="150" height="54" rx="11" fill="#121826" stroke="#243044"/>
    <rect x="470" y="250" width="4" height="54" rx="2" fill="#fbbf24"/>
    <text x="545" y="274" text-anchor="middle" fill="#e7edf5" font-size="12.5" font-weight="700">Router</text>
    <text x="545" y="292" text-anchor="middle" fill="#fbbf24" font-size="11">Brent</text>
  </g>
  <!-- E: persistence + orchestrator (Keith) -->
  <g>
    <rect x="672" y="120" width="180" height="54" rx="11" fill="#121826" stroke="#243044"/>
    <rect x="672" y="120" width="4" height="54" rx="2" fill="#8b9dff"/>
    <text x="762" y="144" text-anchor="middle" fill="#e7edf5" font-size="12" font-weight="700">Persistence + orchestrator</text>
    <text x="762" y="162" text-anchor="middle" fill="#8b9dff" font-size="11">Keith</text>
  </g>
  <!-- F: dreaming (Scott B.) -->
  <g>
    <rect x="672" y="300" width="180" height="54" rx="11" fill="#121826" stroke="#243044"/>
    <rect x="672" y="300" width="4" height="54" rx="2" fill="#f472b6"/>
    <text x="762" y="324" text-anchor="middle" fill="#e7edf5" font-size="12.5" font-weight="700">Dreaming worker</text>
    <text x="762" y="342" text-anchor="middle" fill="#f472b6" font-size="11">Scott B.</text>
  </g>
  <!-- J: integration -->
  <g>
    <rect x="905" y="200" width="145" height="58" rx="12" fill="#121826" stroke="url(#dgp)" stroke-width="1.4"/>
    <text x="977" y="226" text-anchor="middle" fill="#e7edf5" font-size="13" font-weight="700">Integration</text>
    <text x="977" y="244" text-anchor="middle" fill="#9fb0c5" font-size="10.5">all · D8</text>
  </g>
  <!-- K: ship -->
  <g>
    <rect x="1065" y="200" width="120" height="58" rx="12" fill="#101a22" stroke="url(#dgp)" stroke-width="1.8"/>
    <text x="1125" y="226" text-anchor="middle" fill="#e7edf5" font-size="13" font-weight="800">Ship 🚀</text>
    <text x="1125" y="244" text-anchor="middle" fill="#9fb0c5" font-size="10.5">metrics · D10</text>
  </g>
</svg>
