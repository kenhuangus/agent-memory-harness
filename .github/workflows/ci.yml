name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job name "test" -> the status-check context required by branch protection.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Offline smoke tests (stdlib only — no deps installed)
        working-directory: eval
        run: python tests/test_smoke.py
